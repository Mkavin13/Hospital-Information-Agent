# Server configuration
server.port=8081

# Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:hospital_agent_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USER:root}
spring.datasource.password=Crazy_kavin13
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# CORS Configurations
hospital.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173

# AI Chatbot Configurations
# Choose between: gemini, llama, or mock
hospital.ai.provider=llama
hospital.ai.gemini.key=${GEMINI_API_KEY:}
hospital.ai.gemini.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent
hospital.ai.llama.key=${LLAMA_API_KEY}
hospital.ai.llama.url=https://openrouter.ai/api/v1/chat/completions
hospital.ai.llama.model=qwen/qwen-2.5-7b-instruct
